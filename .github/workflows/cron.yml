name: Mediguard Reminders Cron Job

on:
  schedule:
    # Runs every 1 minute to ensure exact time matching
    # Note: GitHub Actions does not guarantee precise minute-level execution
    - cron: '* * * * *'
  
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Cron Endpoint
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_URL" ]; then
            echo "Error: CRON_URL secret is not set."
            exit 1
          fi
          
          # Ping the Vercel production endpoint
          # We pass the secret as a Bearer token matching the logic in our API
          curl -sS -X GET "$CRON_URL" -H "Authorization: Bearer $CRON_SECRET"
          
          echo "Cron endpoint triggered successfully."
